<!DOCTYPE html>
<html>
<head>
    <title>ONYX AI Chat</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }
        #chatbox {
            width: 350px;
            height: 500px;
            border: 1px solid #ccc;
            background: white;
            margin: 50px auto;
            display: flex;
            flex-direction: column;
        }
        #messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }
        .msg {
            margin: 8px 0;
        }
        .user {
            text-align: right;
            color: blue;
        }
        .bot {
            text-align: left;
            color: black;
        }
        #inputBox {
            display: flex;
        }
        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-top: 1px solid #ccc;
        }
        button {
            padding: 10px;
            border: none;
            background: black;
            color: white;
        }
    </style>
</head>

<body>

<div id="chatbox">
    <div id="messages"></div>

    <div id="inputBox">
        <input id="input" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const API_URL = "https://onyx-chat.onrender.com/chat";

const userId = Math.random().toString(36).substring(7);

function addMessage(text, sender) {
    const msg = document.createElement("div");
    msg.className = "msg " + sender;
    msg.innerText = text;
    document.getElementById("messages").appendChild(msg);
}

async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value;
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: text,
                user_id: userId
            })
        });

        if (!res.ok) {
            throw new Error("Server error");
        }

        const data = await res.json();
        addMessage(data.reply, "bot");

    } catch (err) {
        addMessage("Something went wrong. Try again.", "bot");
        console.error(err);
    }
}

document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

</script>

</body>
</html>
