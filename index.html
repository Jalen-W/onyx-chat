<!DOCTYPE html>
<html>
<head>
    <title>ONYX AI Chat</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background:  linear-gradient(135deg, #f5f5f5, #e8e8e8);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chatbox {
            width: 100%;
            max-width: 700px;
            height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }


        .user {
            align-self: flex-end;
            background: black;
            color: white;
            padding: 10px 12px;
            border-radius: 14px 14px 0 14px;
        }

        .bot {
            align-self: flex-start;
            background: #f1f1f1;
            color: black;
            padding: 10px 12px;
            border-radius: 14px 14px 14px 0;
        }

        #inputBox {
            display: flex;
            border-top: 1px solid #eee;
            padding: 10px;
            background: white;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            padding: 12px 16px;
            border: none;
            background: black;
            color: white;
            cursor: pointer;
            border-radius: 8px;
        }

        button:hover {
            background: #333;
        }

        @media (max-width: 600px) {
            body {
                align-items: stretch;
                background: white;
            }

            #chatbox {
                height: 100vh;
                max-height: none;
                width: 100%;
                border-radius: 0;
            }
        }

        .msg {
            margin: 8px 0;
            padding: 10px 12px;
            border-radius: 14px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.4;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeSlideIn 0.25s ease forwards;
        }

        @keyframes fadeSlideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #typing {
            animation: none !important;
            opacity: 1;
            transform: none;
        }

        .dots {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>

<body>

<div id="chatbox">
    <div id="messages"></div>

    <div id="inputBox">
        <input id="input" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const API_URL = "https://onyx-chat.onrender.com/chat";

const userId = Math.random().toString(36).substring(7);

const messagesEl = document.getElementById("messages");

function scrollToBottom() {
    const messages = messagesEl
    messages.scrollTo({
        top: messages.scrollHeight,
        behavior: "smooth"
    });
        
    
}

function addTypingIndicator() {
    if (document.getElementById("typing")) return;
    const typing = document.createElement("div");
    typing.id = "typing";
    typing.className = "msg bot";
    typing.innerHTML = "ONYX is typing<span class='dots'>...</span>";
    messagesEl.appendChild(typing);
    scrollToBottom();
}

function removeTypingIndicator() {
    const typing = document.getElementById("typing");
    if (typing) {
        typing.style.opacity = "0";
        typing.style.transition = "0.2s";
        setTimeout(() => typing.remove(), 200);
    }
}

function addMessage(text, sender) {
    const msg = document.createElement("div");
    msg.classList.add("msg");
    if (sender === "user") msg.classList.add("user");
    if (sender === "bot") msg.classList.add("bot");
    msg.textContent = text;

    messagesEl.appendChild(msg);
    scrollToBottom();
}

async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value;
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    addTypingIndicator();

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: text,
                user_id: userId
            })
        });

        if (!res.ok) {
            throw new Error("Server error");
        }

        const data = await res.json();

        removeTypingIndicator();
        setTimeout(() => {
            addMessage(data.reply, "bot");
            scrollToBottom();
        }, 50);

    } catch (err) {
        addMessage("Something went wrong. Try again.", "bot");
        console.error(err);
    }
}

document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
    }
});

window.onload = function () {
    addMessage("Hi! Welcome to ONYX Heated Reformer Pilates, How can I help you today?", "bot");

    setTimeout(() => {
        addMessage("Are you looking for classes, pricing, or memberships today?", "bot");
    }, 600);

    document.getElementById("input").focus();
};

</script>

</body>
</html>
